<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Student Information</title>

    <link rel="stylesheet" href="design.css">
</head>

<body>

    <div class="container">
        <fieldset>
            
<legend > Student Information </legend>
        <form>
            <table>
                <tr>
                    <td><label for="name"> First Name (Text) : </label></td>
                    <td><input type="text" id="name" name="name" placeholder="Enter your full name"></td>
                </tr>
                <tr>
                    <td><label for="Email"> Email Address : </label></td>
                    <td><input type="email" id="Email" name="Email" placeholder="your.email@example.com"></td>
                </tr>
                <tr>
                    <td><label for="Password"> Password : </label> </td>
                    <td><input type="password" id="Password" name="Password" placeholder="Enter secure password"></td>
                </tr>
                <tr>
                    <td><label for="Age"> Age (Number) : </label> </td>
                    <td><input type="number" id="Age" name="Age" placeholder="Enter your age"></td>
                </tr>
                <tr>
                    <td><label for="Experiment Date"> Experiment Date : </label> </td>
                    <td><input type="date" id="ExperimentDate" name="ExperimentDate"></td>
                </tr>

                <tr>
                    <td><label for="Phone"> Phone Number (Tel) : </label></td>
                    <td><input type="text" id="Phone" name="Phone" placeholder="+880 XXXX XXXXXX"></td>
                </tr>

           </table>
        </fieldset>

       <input type = "submit" id ="submit" name ="submit" value ="Submit">
        <input type = "reset" id ="reset" name ="reset" value ="Clear">

    </form>
    
</div>

</body>
</html>
